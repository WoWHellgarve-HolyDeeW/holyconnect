# Plain text SSID/password is fine here.
# HolyConnect hashes the WPA key automatically when copying this config to the SD card.
country=PT
ctrl_interface=DIR=/var/run/wpa_supplicant GROUP=netdev
update_config=1

network={
    ssid="YOUR_WIFI_NAME"
    psk="YOUR_WIFI_PASSWORD"
    priority=100
    scan_ssid=1
}

# Add more network blocks if you want the Pi to try multiple Wi-Fi networks.
# The highest priority value wins when more than one known network is available.
#
